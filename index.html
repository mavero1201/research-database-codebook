<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Data Encoding Application</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Data Encoding Application</h1>
    </header>
    <main>
        <section>
            <h2>Upload Files</h2>
            <div class="upload-area" id="codebook-upload">
                <h3>Upload Codebook</h3>
                <input type="file" id="codebook-file" accept=".csv, .xls, .xlsx">
            </div>
            <div class="upload-area" id="data-upload">
                <h3>Upload Data File</h3>
                <input type="file" id="data-file" accept=".csv, .xls, .xlsx">
            </div>
        </section>
        <section>
            <h2>Data Preview</h2>
            <table id="data-preview">
                <thead>
                    <tr>
                        <th>Column 1</th>
                        <th>Column 2</th>
                        <th>Column 3</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </section>
        <section>
            <h2>Actions</h2>
            <button id="validate-data">Validate Data</button>
            <button id="export-data">Export Data</button>
        </section>
    </main>
</body>
</html>
